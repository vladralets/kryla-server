databases:
  - name: kryla-postgres
    databaseName: kryla
    user: kryla
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"

services:
  - type: web
    name: kryla-server
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SERVER_ID
        value: ge
      - key: DATABASE_URL
        fromDatabase:
          name: kryla-postgres
          property: connectionString
      # REDIS_URL is optional — leave empty for MVP or set to Upstash URL
      - key: REDIS_URL
        value: ""
